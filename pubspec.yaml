name: casio_fx991
description: "Youssef Jaber Video Converter - Ultra-Fast MP4 to 3GP for Android"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  file_picker: ^6.1.1
  media_store_plus: ^0.0.16
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.2.0
  image: ^4.1.1
  path_provider: ^2.1.1
  permission_handler: ^11.5.1
  video_thumbnail: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

  fonts:
    - family: ElMessiri
      fonts:
        - asset: assets/fonts/ElMessiri-Regular.ttf
          weight: 400
        - asset: assets/fonts/ElMessiri-Bold.ttf
          weight: 700
