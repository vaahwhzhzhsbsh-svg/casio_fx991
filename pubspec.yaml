name: casio_fx991
description: "Youssef Jaber Video Converter - Ultra-Fast MP4 to 3GP for Android"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  file_picker: ^8.0.0
  media_store_plus: ^1.5.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  image: ^4.1.3
  video_thumbnail: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
